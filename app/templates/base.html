<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agentes de IA · Equipo de Obed Vargas{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              ink: { 50: '#f5f7fa', 100: '#e4e7eb', 200: '#cbd2d9', 400: '#7c8794', 600: '#3e4c59', 800: '#1f2933', 900: '#121a23' },
              brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              glow: '0 0 40px -10px rgba(255,255,255,0.1)',
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      body { font-family: 'Inter', system-ui, sans-serif; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      
      /* Glass effect utilities */
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-300 min-h-screen selection:bg-white/20">

    <nav class="border-b border-white/10 bg-[#09090b]/80 backdrop-blur-md sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-4 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-zinc-800 to-zinc-900 border border-white/10 flex items-center justify-center text-white shadow-glow group-hover:border-white/30 transition-colors p-1.5">
            <img src="/static/img/logo.svg" alt="AI Logo" class="w-full h-full invert brightness-200">
          </div>
          <div>
            <div class="font-bold text-zinc-100 text-lg tracking-tight">Agentes de IA</div>
            <div class="text-xs text-zinc-500 font-medium tracking-wide uppercase">Equipo de Obed Vargas</div>
          </div>
        </a>
        <div class="flex items-center gap-3 text-sm text-zinc-500">
          <i class="fa-solid fa-shield-halved"></i>
          <span class="hidden sm:inline">Gobernanza</span>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10 relative">
      <!-- Decoración de fondo suave -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-[400px] bg-white/[0.02] blur-[100px] rounded-full pointer-events-none -z-10"></div>
      
      {% block content %}{% endblock %}
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-8 text-xs text-zinc-500">
      <div class="flex flex-col sm:flex-row items-center justify-between border-t border-white/10 pt-6 gap-4">
        <span>Agentes de IA · Equipo de Obed Vargas</span>
        <span class="flex gap-4">
          <a href="#" class="hover:text-zinc-300 transition-colors">Documentación</a>
          <a href="#" class="hover:text-zinc-300 transition-colors">Soporte</a>
        </span>
      </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
